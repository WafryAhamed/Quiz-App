server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/quiz_learning_db}
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

app:
  jwt:
    secret: ${JWT_SECRET:please_change_this_super_secret_key_for_sri_lanka_quiz_app_12345}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  ai:
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}

logging:
  level:
    "[lk.edu.quizapp]": INFO
